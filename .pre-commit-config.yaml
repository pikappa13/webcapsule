repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: python -m ruff format . --check
        language: python
        additional_dependencies: ["ruff>=0.4"]
        pass_filenames: false

      - id: ruff-check
        name: ruff check
        entry: python -m ruff check .
        language: python
        additional_dependencies: ["ruff>=0.4"]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: python -m mypy webcapsule
        language: python
        additional_dependencies:
          - "mypy>=1.10"
          - "types-beautifulsoup4"
        pass_filenames: false
